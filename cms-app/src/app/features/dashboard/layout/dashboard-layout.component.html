<div class="dashboard-wrapper" [class.collapsed]="isSidebarCollapsed">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <i class="pi pi-bolt"></i>
        <span>CMS Admin</span>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <i class="pi" [class.pi-angle-left]="!isSidebarCollapsed" [class.pi-angle-right]="isSidebarCollapsed"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div *ngFor="let item of menuItems" class="nav-group">
        <a 
          *ngIf="!item.children" 
          [routerLink]="item.route" 
          routerLinkActive="active" 
          [routerLinkActiveOptions]="{exact: item.exact || false}"
          class="nav-item"
        >
          <i [class]="item.icon"></i>
          <span class="label">{{ item.label }}</span>
        </a>

        <div *ngIf="item.children" class="nav-item-has-children">
          <div class="nav-item parent">
            <i [class]="item.icon"></i>
            <span class="label">{{ item.label }}</span>
          </div>
          <div class="sub-nav">
            <a 
              *ngFor="let child of item.children" 
              [routerLink]="child.route" 
              routerLinkActive="active"
              class="sub-nav-item"
            >
              {{ child.label }}
            </a>
          </div>
        </div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile">
        <img [src]="'https://ui-avatars.com/api/?name=' + currentUser()?.firstName + '+' + currentUser()?.lastName" alt="User">
        <div class="user-info">
          <span class="name">{{ currentUser()?.firstName }}</span>
          <span class="role">{{ currentUser()?.role }}</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" title="Logout">
        <i class="pi pi-sign-out"></i>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    <div class="content-header">
      <div class="breadcrumb">
        <!-- Optional: Add dynamic breadcrumb here -->
      </div>
      <div class="header-actions">
        <a routerLink="/blog" target="_blank" class="view-site-btn">
          <i class="pi pi-external-link"></i> View Site
        </a>
      </div>
    </div>
    
    <div class="content-body">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
