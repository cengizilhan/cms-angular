<div class="category-list-container">
  <p-toast />
  <p-confirmDialog />

  <div class="page-header">
    <h1>Categories</h1>
    <p-button label="Add New Category" icon="pi pi-plus" (onClick)="showAddDialog()" />
  </div>

  <p-table [value]="categories" responsiveLayout="scroll" styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Slug</th>
        <th>Count</th>
        <th style="width: 120px">Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-category>
      <tr>
        <td><strong>{{ category.name }}</strong></td>
        <td>{{ category.description || '-' }}</td>
        <td><code>{{ category.slug }}</code></td>
        <td>{{ category.postCount }}</td>
        <td class="actions">
          <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="info" (onClick)="editCategory(category)" />
          <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="deleteCategory(category)" />
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center">No categories found.</td>
      </tr>
    </ng-template>
  </p-table>

  <!-- Category Form Dialog -->
  <p-dialog 
    [header]="isEditMode ? 'Edit Category' : 'Add New Category'" 
    [(visible)]="displayDialog" 
    [modal]="true" 
    [style]="{width: '500px'}"
    [draggable]="false"
    [resizable]="false"
  >
    <app-dynamic-form 
      *ngIf="displayDialog"
      [schema]="categorySchema" 
      [data]="categoryData"
      (formSubmit)="handleFormSubmit($event)"
      (formCancel)="onCancel()"
    />
  </p-dialog>
</div>
